<!doctype html>
<html lang="ja">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>dotirast</title>
        <link rel="stylesheet" href="/style.css">
    </head>
    <body>
        <div class="app-shell">
            <header class="app-header">
                <div>
                    <p class="eyebrow">CLI to browser pixel stream</p>
                    <h1>dotirast</h1>
                </div>
                <div class="status-panel">
                    <div>
                        <span class="label">Canvas</span>
                        <strong id="canvas-name">loading</strong>
                    </div>
                    <div>
                        <span class="label">Size</span>
                        <strong id="canvas-size">-</strong>
                    </div>
                    <div>
                        <span class="label">Hover</span>
                        <strong id="cursor-coords">-</strong>
                    </div>
                    <div class="connection">
                        <span class="label">Connection</span>
                        <strong id="connection-status" data-state="connecting">connecting</strong>
                    </div>
                </div>
            </header>

            <main class="workspace">
                <section class="canvas-panel">
                    <div class="grid-frame">
                        <div id="canvas-grid" class="canvas-grid" aria-label="Pixel canvas"></div>
                    </div>
                    <div class="canvas-toolbar">
                        <button id="save-png-btn" class="toolbar-btn" type="button" disabled>Save as PNG</button>
                    </div>
                </section>
            </main>
        </div>

        <script src="/app.js" defer></script>
    </body>
</html>
